html <!DOCTYPE html> <html lang="ja"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>数独バトル 完成版🔥</title>  <!-- Firebase --> <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script> <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>  <script> const firebaseConfig = {   apiKey: "AIzaSyCHH4xIuDa3WYhXl91U6xLv0RoAdbcfyXU",   authDomain: "hagee-e2c0c.firebaseapp.com",   databaseURL: "https://hagee-e2c0c-default-rtdb.firebaseio.com/",   projectId: "hagee-e2c0c" };  firebase.initializeApp(firebaseConfig); const db = firebase.database(); </script>  <style> body { background:#111; color:#fff; text-align:center; font-family:sans-serif; } .grid {   display:grid;   grid-template-columns:repeat(9,1fr);   max-width:320px;   margin:20px auto; } .cell {   border:1px solid #444;   padding:12px;   cursor:pointer;   font-size:18px; } .cell.fixed { color:#888; cursor:default; } </style> </head>  <body>  <h1>数独バトル🔥</h1>  <input id="name" placeholder="名前"><br><br>  <button onclick="createRoom()">部屋作る</button><br><br>  <input id="room" placeholder="ルームコード"> <button onclick="joinRoom()">参加</button>  <h2 id="status"></h2> <div id="grid" class="grid"></div>  <script> // ===== 状態 ===== let roomCode=""; let board=[]; let fixed=[];  // ===== 数独生成 ===== function generate(){   const solution = [     [5,3,4,6,7,8,9,1,2],     [6,7,2,1,9,5,3,4,8],     [1,9,8,3,4,2,5,6,7],     [8,5,9,7,6,1,4,2,3],     [4,2,6,8,5,3,7,9,1],     [7,1,3,9,2,4,8,5,6],     [9,6,1,5,3,7,2,8,4],     [2,8,7,4,1,9,6,3,5],     [3,4,5,2,8,6,1,7,9]   ];    const puzzle = solution.map(r=>r.map(v=>Math.random()<0.5?0:v));   return puzzle; }  // ===== 描画 ===== function render(){   const grid = document.getElementById("grid");   grid.innerHTML="";    for(let r=0;r<9;r++){     for(let c=0;c<9;c++){       const d=document.createElement("div");       d.className="cell";        if(fixed[r][c]){         d.classList.add("fixed");         d.textContent=board[r][c];       }else{         d.textContent=board[r][c]||"";         d.onclick=()=>{           const n=prompt("1-9入力");           if(!n) return;            board[r][c]=Number(n);           db.ref("rooms/"+roomCode+"/board").set(board);         };       }        grid.appendChild(d);     }   } }  // ===== ルーム作成 ===== function createRoom(){   roomCode=Math.random().toString(36).substring(2,6);    board=generate();   fixed=board.map(r=>r.map(v=>v!==0));    db.ref("rooms/"+roomCode).set({     board,     fixed   });    startSync();    document.getElementById("status").innerText="コード: "+roomCode; }  // ===== 参加 ===== function joinRoom(){   roomCode=document.getElementById("room").value;    startSync(); }  // ===== 同期 ===== function startSync(){   db.ref("rooms/"+roomCode).on("value",snap=>{     const data=snap.val();     if(!data) return;      board=data.board;     fixed=data.fixed;      render();   }); } </script>  </body> </html>
