<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独バトル 完成版🔥</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        body { background:#111; color:#fff; text-align:center; font-family:sans-serif; margin: 0; padding: 20px; }
        .grid { display:grid; grid-template-columns:repeat(9,1fr); max-width:320px; margin:20px auto; border:2px solid #fff; }
        .cell { border:1px solid #444; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; cursor:pointer; font-size:18px; background: #222; }
        .cell.fixed { color:#888; background: #333; cursor:default; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:active { background: #ff6b81; }
    </style>
</head>
<body>

    <h1>数独バトル🔥</h1>
    <input id="name" placeholder="名前を入力">
    <br>
    <button onclick="createRoom()">部屋を作る</button>
    <br><br>
    <input id="room" placeholder="ルームコード">
    <button onclick="joinRoom()">参加する</button>

    <h2 id="status"></h2>
    <div id="grid" class="grid"></div>

    <script>
        // Firebase初期化
        const firebaseConfig = {
            apiKey: "AIzaSyCHH4xIuDa3WYhXl91U6xLv0RoAdbcfyXU",
            authDomain: "hagee-e2c0c.firebaseapp.com",
            databaseURL: "https://hagee-e2c0c-default-rtdb.firebaseio.com/",
            projectId: "hagee-e2c0c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 状態
        let roomCode = "";
        let board = [];
        let fixed = [];

        function generate() {
            const solution = [
                [5,3,4,6,7,8,9,1,2], [6,7,2,1,9,5,3,4,8], [1,9,8,3,4,2,5,6,7],
                [8,5,9,7,6,1,4,2,3], [4,2,6,8,5,3,7,9,1], [7,1,3,9,2,4,8,5,6],
                [9,6,1,5,3,7,2,8,4], [2,8,7,4,1,9,6,3,5], [3,4,5,2,8,6,1,7,9]
            ];
            // 50%の確率で数字を残す
            return solution.map(r => r.map(v => Math.random() < 0.5 ? 0 : v));
        }

        function render() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const d = document.createElement("div");
                    d.className = "cell";
                    if(fixed[r][c]) {
                        d.classList.add("fixed");
                        d.textContent = board[r][c];
                    } else {
                        d.textContent = board[r][c] || "";
                        d.onclick = () => {
                            const n = prompt("1-9の数字を入力してください");
                            if(!n || isNaN(n) || n < 1 || n > 9) return;
                            board[r][c] = Number(n);
                            db.ref("rooms/" + roomCode + "/board").set(board);
                        };
                    }
                    grid.appendChild(d);
                }
            }
        }

        function createRoom() {
            roomCode = Math.random().toString(36).substring(2,6);
            board = generate();
            fixed = board.map(r => r.map(v => v !== 0));

            db.ref("rooms/" + roomCode).set({
                board: board,
                fixed: fixed
            }).then(() => {
                startSync();
                document.getElementById("status").innerText = "ルームコード: " + roomCode;
            }).catch(e => alert("エラー: " + e.message));
        }

        function joinRoom() {
            roomCode = document.getElementById("room").value;
            if(!roomCode) return alert("コードを入れてね");
            startSync();
        }

        function startSync() {
            db.ref("rooms/" + roomCode).on("value", snap => {
                const data = snap.val();
                if(!data) {
                    alert("部屋が見つかりません");
                    return;
                }
                board = data.board;
                fixed = data.fixed;
                render();
            });
        }
    </script>
</body>
</html>
